name: Deploy — Well This Is Sports

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloudways
    runs-on: ubuntu-latest

    env:
      THEME_PATH: /home/master/applications/djxudszeqq/public_html/wp-content/themes/wellthiissports-child
      WP_ROOT: /home/master/applications/djxudszeqq/public_html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy theme files via SSH rsync
        uses: appleboy/ssh-action@v1.2.5
        env:
          # Pass token as env var so it is not expanded inline in the script body
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USER }}
          key: ${{ secrets.CLOUDWAYS_SSH_PRIVATE_KEY }}
          envs: THEME_PATH,WP_ROOT,GH_TOKEN
          script: |
            set -e
            mkdir -p "$THEME_PATH"

            STAGING=/tmp/wtis-deploy

            if [ -d "$STAGING/.git" ]; then
              cd "$STAGING" && git fetch origin main && git reset --hard origin/main
            else
              rm -rf "$STAGING"
              git clone --depth=1 --branch=main \
                "https://x-access-token:${GH_TOKEN}@github.com/clabm/wellthisissports.git" \
                "$STAGING"
            fi

            rsync -rl --delete --no-perms \
              --exclude='.git/' \
              --exclude='wordpress/' \
              --exclude='pipeline/' \
              --exclude='.lando*' \
              --exclude='node_modules/' \
              --exclude='.sass-cache/' \
              --exclude='*.md' \
              "$STAGING/" "$THEME_PATH/"

            echo "Rsync complete."

            cd "$WP_ROOT" && wp cache flush --allow-root && echo "Object cache flushed." || true
            BREEZE_CACHE="$WP_ROOT/wp-content/cache"
            rm -rf "$BREEZE_CACHE/breeze/" "$BREEZE_CACHE/breeze-minification/" && echo "Breeze cache cleared." || true
            echo "Deploy complete."
