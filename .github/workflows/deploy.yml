name: Deploy — Well This Is Sports

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloudways
    runs-on: ubuntu-latest

    env:
      # Theme path is not sensitive — hardcoded to avoid empty-secret failures.
      THEME_PATH: /home/master/applications/djxudszeqq/public_html/wp-content/themes/wellthiissports-child
      WP_ROOT: /home/master/applications/djxudszeqq/public_html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Cloudways git pull
        uses: roelmagdaleno/cloudways-api-git-pull-action@v1.3.0
        with:
          email: ${{ secrets.CLOUDWAYS_EMAIL }}
          api-key: ${{ secrets.CLOUDWAYS_API_KEY }}
          server-id: ${{ secrets.CLOUDWAYS_SERVER_ID }}
          app-id: ${{ secrets.CLOUDWAYS_APP_ID }}
          branch-name: main
          deploy-path: public_html/wp-content/themes/wellthiissports-child

      - name: Sync git_repo → theme directory via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USER }}
          key: ${{ secrets.CLOUDWAYS_SSH_PRIVATE_KEY }}
          envs: THEME_PATH,WP_ROOT
          script: |
            sleep 20
            rsync -rl --no-perms --no-times --ignore-times \
              --exclude='.git' --exclude='wordpress/' \
              /home/master/applications/djxudszeqq/git_repo/ \
              "$THEME_PATH"/
            echo "Sync complete."
            cd "$WP_ROOT" && wp cli update --allow-root --quiet || true
            cd "$WP_ROOT" && wp eval 'opcache_reset();' --allow-root && echo "Opcache cleared." || echo "Opcache reset not available."
            cd "$WP_ROOT" && wp cache flush --allow-root && echo "Object cache flushed." || echo "Object cache flush not available."
            BREEZE_CACHE="$WP_ROOT/wp-content/cache"
            rm -rf "$BREEZE_CACHE/breeze/" && echo "Breeze page cache cleared." || true
            rm -rf "$BREEZE_CACHE/breeze-minification/" && echo "Breeze minification cache cleared." || true
            echo "Cache purge complete."
